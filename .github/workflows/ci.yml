name: scriptony CI/CD with Deployment

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm run test -- --passWithNoTests

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_HOST }} $(cat ~/.ssh/known_hosts 2>/dev/null || echo '')" > ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to production server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/scriptony' }}
        run: |
          echo "🚀 Deploying to production..."
          
          # Connect to server and pull latest changes
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "
            set -e
            cd $DEPLOY_PATH || exit 1
            
            echo 'Pulling latest changes...'
            git pull origin main
            
            echo 'Stopping containers...'
            docker-compose down
            
            echo 'Building and starting containers...'
            docker-compose up -d --build
            
            echo 'Cleaning up old images...'
            docker system prune -f
            
            echo '✅ Deployment complete!'
          "

      - name: Telegram notification (success)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ Scriptony deployed successfully!
            
            🌐 https://${{ secrets.DOMAIN || 'localhost' }}
            
            Commit: ${{ github.sha }}
            By: ${{ github.actor }}

      - name: Telegram notification (failure)
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Scriptony deployment failed!
            
            Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

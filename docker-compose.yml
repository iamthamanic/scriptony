version: '3.8'

# ============================================
# Scriptony Docker Compose
# For KVM with 4GB RAM (plenty of resources)
# ============================================
#
# No resource limits needed - 4GB is plenty!
# All services can use as much RAM as they need.

# Configurable via .env file or environment variables:
# - DOMAIN: Your domain (default: localhost)
# - FRONTEND_PORT: Frontend exposed port (default: 8080)
# - BACKEND_PORT: Backend exposed port (default: 3000)
# - BACKEND_HOST: Backend container name (default: scriptony-api)

services:
  # Frontend (React app with nginx)
  scriptony-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scriptony-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    networks:
      - scriptony-network
    depends_on:
      - scriptony-api
    environment:
      - BACKEND_HOST=${BACKEND_HOST:-scriptony-api}
      - BACKEND_PORT=${BACKEND_PORT:-3000}
      - VITE_API_URL=http://${BACKEND_HOST:-scriptony-api}:${BACKEND_PORT:-3000}
    # Substitute env vars in nginx config at runtime
    command: /bin/sh -c "envsubst '\$${BACKEND_HOST} \$${BACKEND_PORT}' < /etc/nginx/conf.d/default.conf > /etc/nginx/conf.d/default.conf.tmp && mv /etc/nginx/conf.d/default.conf.tmp /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"

  # Backend (Fastify API)
  # Note: Backend code should be in ./api directory or provide your own Dockerfile
  scriptony-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: scriptony-api
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - scriptony-network
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Database
      - DATABASE_URL=${DATABASE_URL}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      # OAuth
      - GOOGLE_AUTH_CLIENT_ID=${GOOGLE_AUTH_CLIENT_ID}
      - GOOGLE_AUTH_CLIENT_SECRET=${GOOGLE_AUTH_CLIENT_SECRET}
      - GOOGLE_DRIVE_CLIENT_ID=${GOOGLE_DRIVE_CLIENT_ID}
      - GOOGLE_DRIVE_CLIENT_SECRET=${GOOGLE_DRIVE_CLIENT_SECRET}
      # MinIO / S3
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-scriptony-uploads}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
    volumes:
      - api-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Optional: Traefik reverse proxy (recommended for multiple domains)
  # Uncomment to use Traefik instead of nginx
  # traefik:
  #   image: traefik:v2.10
  #   container_name: traefik
  #   restart: unless-stopped
  #   command:
  #     - --api.insecure=true
  #     - --providers.docker=true
  #     - --entrypoints.web.address=:80
  #     - --entrypoints.websecure.address=:443
  #     - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
  #     - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}
  #     - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - traefik-certs:/letsencrypt
  #   networks:
  #     - scriptony-network

  # Optional: SSL nginx (for Let's Encrypt)
  # Uncomment if you want nginx to handle SSL instead of using external proxy
  # nginx-ssl:
  #   image: nginx:alpine
  #   container_name: scriptony-nginx-ssl
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #     - ./nginx/prod.conf.template:/etc/nginx/templates/default.conf.template:ro
  #   networks:
  #     - scriptony-network
  #   depends_on:
  #     - scriptony-frontend
  #     - scriptony-api
  #   environment:
  #     - DOMAIN=${DOMAIN:-localhost}
  #     - BACKEND_HOST=${BACKEND_HOST:-scriptony-api}
  #     - BACKEND_PORT=${BACKEND_PORT:-3000}

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: scriptony-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - scriptony-network
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-scriptony}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${POSTGRES_DB:-scriptony}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: scriptony-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - scriptony-network
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  scriptony-network:
    driver: bridge

volumes:
  api-uploads:
  traefik-certs:
    # Uncomment if using Traefik
  postgres-data:
  minio-data:

version: '3.8'

services:
  # Frontend (React app)
  scriptony-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scriptony-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - scriptony-network
    depends_on:
      - scriptony-api
    environment:
      - VITE_API_URL=http://scriptony-api:3000

  # Backend (Fastify API) - assuming backend code is in ../scriptony-api or similar
  scriptony-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: scriptony-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - scriptony-network
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Database
      - DATABASE_URL=${DATABASE_URL}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      # OAuth
      - GOOGLE_AUTH_CLIENT_ID=${GOOGLE_AUTH_CLIENT_ID}
      - GOOGLE_AUTH_CLIENT_SECRET=${GOOGLE_AUTH_CLIENT_SECRET}
      - GOOGLE_DRIVE_CLIENT_ID=${GOOGLE_DRIVE_CLIENT_ID}
      - GOOGLE_DRIVE_CLIENT_SECRET=${GOOGLE_DRIVE_CLIENT_SECRET}
      # MinIO / S3
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
    volumes:
      - api-uploads:/app/uploads

  # Optional: Nginx reverse proxy for SSL
  nginx:
    image: nginx:alpine
    container_name: scriptony-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - scriptony-network
    depends_on:
      - scriptony-frontend
      - scriptony-api

networks:
  scriptony-network:
    driver: bridge

volumes:
  api-uploads:
